; PlatformIO Configuration for M5PaperS3
; Kimi Code LLM Communication Monitor

[env:m5papers3]
platform = espressif32
board = m5stack-stamps3
framework = arduino

; Libraries
lib_deps =
    m5stack/M5GFX@^0.2.0
    m5stack/M5Unified@^0.2.0
    bblanchon/ArduinoJson@^7.0.0

; Build options
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

; Serial monitor
monitor_speed = 115200

; Upload
upload_speed = 1500000

; Partition scheme (larger app space)
board_build.partitions = huge_app.csv
